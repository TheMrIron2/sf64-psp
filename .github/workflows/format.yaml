name: Check Format

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    name: Check format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install package requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip clang-format-14 clang-tidy-14

      - name: Check format
        run: ./tools/check_format.sh