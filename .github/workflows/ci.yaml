name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  psp-bootstrap:
    name: PSPGL bootstrap
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python
        run: |
          apk add --no-cache python3 py3-pip

      - name: Install Python dependencies
        run: |
          python3 -m pip install --break-system-packages -r tools/requirements-python.txt

      - name: Show toolchain info
        run: |
          echo "PSPDEV=$PSPDEV"
          which psp-gcc
          psp-gcc --version
          ls -la "$PSPDEV/psp/include/GL" || true
          ls -la "$PSPDEV/psp/include/GLES" || true
          ls -la "$PSPDEV/psp/lib/libGL.a" || true

      - name: Build bootstrap EBOOT
        run: |
          make bootstrap COLOR=0 VERBOSE=1
