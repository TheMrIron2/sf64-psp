name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  psp-bootstrap:
    name: PSP bootstrap (${{ matrix.backend }})
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    strategy:
      fail-fast: false
      matrix:
        backend:
          - legacy_rsp
          - pspgl

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Python dependencies
        run: |
          python3 -m pip install -r tools/requirements-python.txt

      - name: Show toolchain info
        run: |
          echo "PSPDEV=$PSPDEV"
          which psp-gcc
          psp-gcc --version
          ls -la "$PSPDEV/psp/include/GL" || true
          ls -la "$PSPDEV/psp/include/GLES" || true
          ls -la "$PSPDEV/psp/lib/libGL.a" || true

      - name: Build bootstrap EBOOT
        run: |
          make bootstrap COLOR=0 VERBOSE=1 PSP_RENDERER_BACKEND=${{ matrix.backend }}