name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pspgl-bootstrap:
    name: PSPGL bootstrap
    runs-on: ubuntu-24.04
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show toolchain info
        run: |
          psp-gcc --version
          psp-config --psp-prefix
          psp-config --pspsdk-path

      - name: Build bootstrap EBOOT
        run: make bootstrap